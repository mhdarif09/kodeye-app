services:
  mysql:
    image: mysql:8
    container_name: kodeye_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_NAME:-kodeye_db}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - kodeye_net

  redis:
    image: redis:7-alpine
    container_name: kodeye_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - kodeye_net

  backend:
    build:
      context: .
    container_name: kodeye_backend
    depends_on:
      - mysql
      - redis
    environment:
      NODE_ENV: production
      PORT: 3000

      FRONTEND_URL: ${FRONTEND_URL:-https://kodeye.net}
      FRONTEND_URLS: ${FRONTEND_URLS:-https://app.kodeye.net,https://www.kodeye.net}
      BACKEND_URL: https://api.kodeye.net

      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_NAME: ${DB_NAME:-kodeye_db}

      REDIS_URL: redis://redis:6379

      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      GROQ_API_KEY: ${GROQ_API_KEY}

      IPAYMU_VIRTUAL_ACCOUNT: ${IPAYMU_VIRTUAL_ACCOUNT}
      IPAYMU_API_KEY: ${IPAYMU_API_KEY}
      IPAYMU_MODE: ${IPAYMU_MODE:-sandbox}

    ports:
      - "127.0.0.1:3000:3000"

    restart: unless-stopped

    networks:
      - kodeye_net

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_URL: https://api.kodeye.net
        NEXT_PUBLIC_SOCKET_URL: https://api.kodeye.net
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}

    container_name: kodeye_frontend

    depends_on:
      - backend

    ports:
      - "127.0.0.1:3001:3001"

    restart: unless-stopped

    networks:
      - kodeye_net

volumes:
  mysql_data:
  redis_data:

networks:
  kodeye_net:
    driver: bridge